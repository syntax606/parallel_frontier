  orgs:
    - deepseek-ai          # DeepSeek
    - QwenLM               # Alibaba Qwen
    - THUDM                # Zhipu / Tsinghua KEG (GLM, CogVLM)
    - MoonshotAI           # Kimi
    - InternLM             # Shanghai AI Lab
    - OpenGVLab            # Shanghai AI Lab (InternVL, InternImage)
    - ByteDance-Seed       # ByteDance Seed
    - 01-ai                # 01.AI (Yi)
    - baichuan-inc         # Baichuan
    - MiniMax-AI           # MiniMax
    - stepfun-ai           # StepFun
    - Tencent-Hunyuan      # Tencent Hunyuan
    - PaddlePaddle         # Baidu ERNIE lives under PaddlePaddle/ERNIE
    - OpenBMB              # MiniCPM / CPM
    - inclusionAI          # Ant Group (Ling / Bailing)
    - SkyworkAI            # Skywork / Kunlun

# ─────────────────────────────────────────────────────────────────────────────
# Delivery
# ─────────────────────────────────────────────────────────────────────────────
digest:
  # Resend's test sender only delivers to your Resend account email
  # (syntax606@gmail.com). Once you verify a domain, switch the sender below and
  # you can send anywhere (e.g. css216@nyu.edu).
  recipients: [syntax606@gmail.com]
  # Resend's test sender — no domain verification needed, but ONLY delivers to the
  # email your Resend account is registered under. Swap to a verified domain
  # (e.g. digest@yourdomain.com) for production / arbitrary recipients.
  sender: "Parallel Frontier <onboarding@resend.dev>"
  send_hour_utc: 6          # ~07:30 UK in summer; fixed UTC, accept DST drift (see SPEC)
  provider: resend          # resend | postmark  (API key in GitHub secrets: RESEND_API_KEY)
  capture_url: ""           # optional footer link to your manual capture file
# alert:
#   telegram_chat_id: ""    # optional: mirror alert-tier only, for true interrupts
